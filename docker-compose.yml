services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: green_advisor
      MYSQL_USER: green_user
      MYSQL_PASSWORD: green_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://green_user:green_password@mysql:3306/green_advisor
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5010
      LLM_MODE: ${LLM_MODE:-local}
      DIFY_API_URL: ${DIFY_API_URL:-}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
    ports:
      - "8010:8010"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5010:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:1.98.2
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows/n8n:/workflows:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  uploads:
  n8n_data:
